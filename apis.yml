name: Listings API
description: >-
  A local-marketing / local-SEO API providing white-label infrastructure: one write fans a business location out to
  major publishers (Google Business Profile, Apple Maps, Bing Places, Yelp, Facebook, Tripadvisor, etc.), plus review
  aggregation/response, multi-channel posting, and per-publisher analytics. Exposes a REST API, hosted MCP server, and
  typed SDKs. The REST API is a facade over Synup's federated GraphQL services.
